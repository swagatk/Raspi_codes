/**:
  ros__parameters:
    mode: mapping
    use_sim_time: false

    # Keep frames aligned with the existing pirobot2 stack.
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /pirobot2/scan

    # This robot currently maps without a wheel odometry source, so
    # the launch file can supply an identity odom->base_link transform.
    provide_odom_frame: false
    publish_to_tf: true

    map_update_interval: 0.8
    resolution: 0.05
    max_laser_range: 12.0
    minimum_time_interval: 0.06
    transform_timeout: 0.30
    tf_buffer_duration: 30.0
    throttle_scans: 1
    enable_interactive_mode: false

    use_scan_matching: true
    do_loop_closing: true

    # Conservative defaults for small indoor spaces.
    minimum_travel_distance: 0.03
    minimum_travel_heading: 0.03
    scan_buffer_size: 40
    scan_buffer_maximum_scan_distance: 12.0
    link_match_minimum_response_fine: 0.12
    loop_search_maximum_distance: 6.0
